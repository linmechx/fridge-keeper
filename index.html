<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="냉장고 지킴이">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>냉장고 지킴이</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --primary:#1D9E75;--primary-dark:#0F6E56;--dark:#1a1a2e;
  --bg:#f7f8fa;--card:#fff;--border:#E5E7EB;
  --txt1:#1a1a2e;--txt2:#6B7280;--txt3:#9CA3AF;
  --exp:#E24B4A;--warn:#EF9F27;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;background:var(--bg)}
.screen.active{display:flex}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(16px + var(--safe-bot))}
.status-pad{height:var(--safe-top);background:inherit}
.topbar{background:var(--card);border-bottom:0.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:600;color:var(--txt1)}
.back-btn{display:flex;align-items:center;gap:4px;font-size:15px;color:var(--primary);background:none;border:none;cursor:pointer;padding:4px 0}
.icon-btn{width:38px;height:38px;border-radius:50%;background:#f3f4f6;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2)}
.bnav{background:var(--card);border-top:0.5px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + var(--safe-bot));flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--txt3);font-family:inherit}
.nb svg{width:26px;height:26px}
.nb.act{color:var(--primary)}
#s-ob{background:#fff;justify-content:center;align-items:center;padding:32px 28px}
.ob-icon{width:88px;height:88px;border-radius:28px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:24px}
.ob-h{font-size:28px;font-weight:700;color:var(--txt1);margin-bottom:10px;text-align:center}
.ob-p{font-size:16px;color:var(--txt2);text-align:center;line-height:1.7;margin-bottom:36px}
.card{background:var(--card);border-radius:16px;border:0.5px solid var(--border);padding:16px;margin-bottom:12px}
.hero{background:var(--dark);border-radius:20px;padding:20px;margin-bottom:20px;color:#fff}
.hero-name{font-size:22px;font-weight:600;margin-bottom:5px}
.hero-q{font-size:14px;color:#9FE1CB;line-height:1.6;margin-bottom:16px}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hstat{background:rgba(255,255,255,0.1);border-radius:12px;padding:12px}
.hstat-n{font-size:24px;font-weight:700;color:#fff}
.hstat-l{font-size:12px;color:#9FE1CB;margin-top:2px}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-lbl{font-size:13px;font-weight:600;color:var(--txt2);letter-spacing:0.4px}
.sec-acts{display:flex;gap:6px}
.sm-btn{font-size:12px;color:var(--txt2);background:#f3f4f6;border:0.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:inherit}
.chip{display:inline-block;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px}
.chip-ok{background:#EAF3DE;color:#3B6D11}
.chip-warn{background:#FAEEDA;color:#854F0B}
.chip-exp{background:#FCEBEB;color:#A32D2D}
.chip-cat{background:#f3f4f6;color:var(--txt2)}
.food-row{background:var(--card);border-radius:14px;border:0.5px solid var(--border);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.food-row.warn{border-left:3px solid var(--warn);border-radius:0 14px 14px 0}
.food-row.danger{border-left:3px solid var(--exp);border-radius:0 14px 14px 0}
.cicon{border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.food-info{flex:1;min-width:0}
.food-name{font-size:16px;font-weight:600;color:var(--txt1)}
.food-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
.food-memo{font-size:12px;color:var(--txt3);margin-top:4px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-btn{width:34px;height:34px;border-radius:8px;border:0.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--txt3);font-size:16px}
.row-btn.fav-on{color:#EF9F27;border-color:#EF9F27;background:#FAEEDA}
.row-btn.del:active{background:#FCEBEB;color:#A32D2D}
.fav-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fav-scroll::-webkit-scrollbar{display:none}
.fav-chip{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:12px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;min-width:76px}
.fav-chip-icon{font-size:28px}
.fav-chip-name{font-size:12px;color:var(--txt2);white-space:nowrap;max-width:68px;overflow:hidden;text-overflow:ellipsis}
.cat-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.cat-tile{background:var(--card);border-radius:16px;border:0.5px solid var(--border);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;active:opacity:0.7}
.cat-tile:active{opacity:0.7}
.sort-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-chip{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--txt2);cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.sort-chip.act{background:var(--primary);color:#fff;border-color:var(--primary)}
.search-wrap{background:#f3f4f6;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.search-wrap svg{flex-shrink:0;color:var(--txt3)}
.search-wrap input{flex:1;border:none;background:transparent;font-size:15px;color:var(--txt1);outline:none;font-family:inherit}
.flbl{font-size:13px;color:var(--txt2);font-weight:500;margin-bottom:7px;display:block}
.finp{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);font-size:15px;background:#fff;color:var(--txt1);font-family:inherit;outline:none;-webkit-appearance:none}
.finp:focus{border-color:var(--primary)}
.fgap{margin-top:14px}
.ep-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
.ep-btn{height:48px;border-radius:12px;border:1.5px solid var(--border);background:#f3f4f6;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ep-btn.sel{border-color:var(--primary);background:#E1F5EE}
.date-btn{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);font-size:15px;background:#fff;color:var(--txt1);font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;-webkit-appearance:none}
.date-btn.empty{color:var(--txt3)}
.fav-check-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.fav-check-box{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.fav-check-box.on{background:var(--primary);border-color:var(--primary);color:#fff}
.big-btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.big-btn:active{background:var(--primary-dark)}
.buy-row{background:var(--card);border-radius:14px;border:0.5px solid var(--border);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.buy-check{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:16px}
.buy-check.on{background:var(--primary);border-color:var(--primary);color:#fff}
.buy-name{flex:1;font-size:15px;color:var(--txt1)}
.buy-name.done{text-decoration:line-through;color:var(--txt3)}
.buy-input-row{display:flex;gap:8px;padding:12px 16px;padding-bottom:calc(12px + var(--safe-bot));background:var(--card);border-top:0.5px solid var(--border);flex-shrink:0}
.buy-input-row input{flex:1;padding:13px 14px;border-radius:12px;border:1px solid var(--border);font-size:15px;background:#f3f4f6;color:var(--txt1);font-family:inherit;outline:none}
.buy-input-row input:focus{background:#fff;border-color:var(--primary)}
.buy-add-btn{width:52px;height:52px;border-radius:12px;background:var(--primary);color:#fff;border:none;font-size:26px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.set-section{background:var(--card);border-radius:16px;border:0.5px solid var(--border);overflow:hidden;margin-bottom:12px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:16px}
.set-row+.set-row{border-top:0.5px solid var(--border)}
.set-lbl{font-size:15px;color:var(--txt1)}
.set-val{font-size:14px;color:var(--txt2)}
.set-name-edit{display:flex;gap:8px;padding:0 16px 16px}
.set-name-edit input{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);font-size:15px;background:#fff;color:var(--txt1);font-family:inherit;outline:none}
.set-name-edit input:focus{border-color:var(--primary)}
.set-name-edit button{padding:0 18px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit}
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.sheet-backdrop.open{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:430px;padding-bottom:calc(20px + var(--safe-bot));max-height:90vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:600;color:var(--txt1);margin-bottom:16px}
.sheet-btns{display:flex;gap:8px;margin-top:16px}
.shb{flex:1;padding:13px;border-radius:12px;font-size:15px;cursor:pointer;font-family:inherit;border:none}
.shb-cancel{background:#f3f4f6;color:var(--txt2)}
.shb-save{background:var(--primary);color:#fff;font-weight:600}
.toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 22px;border-radius:100px;font-size:14px;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1}
.dialog-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.dialog-backdrop.open{display:flex}
.dialog{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:320px}
.dialog-title{font-size:17px;font-weight:600;color:var(--txt1);margin-bottom:8px}
.dialog-msg{font-size:15px;color:var(--txt2);line-height:1.6;margin-bottom:22px}
.dialog-btns{display:flex;gap:8px}
.dialog-btns button{flex:1;padding:13px;border-radius:10px;font-size:15px;cursor:pointer;font-family:inherit;border:none;font-weight:500}
.dbtn-cancel{background:#f3f4f6;color:var(--txt2)}
.dbtn-ok{background:#FCEBEB;color:#A32D2D}
.prog-ring{width:48px;height:48px;position:relative}
.prog-ring svg{transform:rotate(-90deg)}
.prog-ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--txt1)}
.empty{text-align:center;padding:48px 16px;color:var(--txt3)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty-txt{font-size:15px}
input[type=date]{-webkit-appearance:none;appearance:none}
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5zqcTTVAzE42IEPUHrtR1ZYipqVl_2RI",
  authDomain: "fridge-keeper-99807.firebaseapp.com",
  projectId: "fridge-keeper-99807",
  storageBucket: "fridge-keeper-99807.firebasestorage.app",
  messagingSenderId: "635052061605",
  appId: "1:635052061605:web:f296c0d658c3f5eccb2e4c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._fbDb = db;
window._fbFns = { doc, setDoc, getDoc, onSnapshot };
window._fbReady = true;
window.dispatchEvent(new Event('fbReady'));
</script>
</head>
<body>
<div id="app">

<!-- Onboarding -->
<div id="s-ob" class="screen">
  <div class="status-pad"></div>
  <div class="ob-icon">❄️</div>
  <div class="ob-h">냉장고 지킴이</div>
  <div class="ob-p">이름을 알려주시면<br>맞춤으로 관리해드릴게요</div>
  <input class="finp" id="ob-name" placeholder="이름을 입력하세요" maxlength="8" style="margin-bottom:14px">
  <button class="big-btn" onclick="startApp()" style="margin-top:0">시작하기</button>
</div>

<!-- Home -->
<div id="s-home" class="screen">
  <div class="status-pad" style="background:var(--dark)"></div>
  <div class="scroll-body" id="home-body"></div>
  <nav class="bnav">
    <button class="nb act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</button>
    <button class="nb" onclick="go('list')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>식품</button>
    <button class="nb" onclick="go('add')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>추가</button>
    <button class="nb" onclick="go('buy')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>구매</button>
    <button class="nb" onclick="go('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>설정</button>
  </nav>
</div>

<!-- Food List -->
<div id="s-list" class="screen">
  <div class="status-pad"></div>
  <div class="topbar">
    <span class="topbar-title">전체 식품</span>
  </div>
  <div style="padding:12px 16px 0;flex-shrink:0">
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="srch-inp" placeholder="식품명으로 검색..." oninput="renderList()">
    </div>
    <div class="sort-bar" id="sort-bar"></div>
  </div>
  <div class="scroll-body" style="padding-top:8px" id="list-body"></div>
  <nav class="bnav">
    <button class="nb" onclick="go('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</button>
    <button class="nb act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>식품</button>
    <button class="nb" onclick="go('add')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>추가</button>
    <button class="nb" onclick="go('buy')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>구매</button>
    <button class="nb" onclick="go('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>설정</button>
  </nav>
</div>

<!-- Category Detail -->
<div id="s-catdetail" class="screen">
  <div class="status-pad"></div>
  <div class="topbar">
    <button class="back-btn" onclick="go('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>뒤로
    </button>
    <span class="topbar-title" id="catdetail-title">카테고리</span>
    <div style="width:60px"></div>
  </div>
  <div class="scroll-body" id="catdetail-body"></div>
</div>

<script>
// 아이콘: 겹치지 않고 평범한 것들로 구성
const FOOD_E=['🍎','🥛','🥚','🥩','🐟','🍗','🥬','🥦','🍅','🥕','🍊','🍇','🍋','🧃','🥤','🍺','🍪','🍫','🧂','🫙','🧊','📦','🌶️','🧄','🧅','🍞','🥐','🫐','🧀','🍆'];
const CAT_COLORS=['#E6F1FB','#EAF3DE','#FAEEDA','#FAECE7','#E1F5EE','#EEEDFE','#FBEAF0','#F1EFE8'];
const QUOTES=['오늘도 냉장고를 깔끔하게! 🧹','신선함을 지키는 작은 습관 ✨','유통기한 관리, 오늘도 완벽해요 👍','버리는 음식 없는 하루를 만들어요 🌿','냉장고가 깨끗하면 기분도 상쾌해요','엄마에게 바치는 앱 🫶','오늘 뭐 먹을지 고민 중인가요? 😄'];
const SORTS=[{k:'expiry',lbl:'만료 임박순'},{k:'name',lbl:'가나다순'},{k:'custom',lbl:'직접 정렬'},{k:'reg',lbl:'등록순'}];

const S={get:(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
const today=()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());};
let userName='',prevS='home',selFoodE='🍎',isFavCheck=false,curSort='expiry',dialogResolve=null,customOrder=S.get('fk_order')||[];

let foods=S.get('fk_foods')||[];
let cats=S.get('fk_cats')||[
  {id:'c1',name:'유제품',icon:'🥛',color:'#E6F1FB'},
  {id:'c2',name:'채소',icon:'🥬',color:'#EAF3DE'},
  {id:'c3',name:'과일',icon:'🍎',color:'#FAEEDA'},
  {id:'c4',name:'육류',icon:'🥩',color:'#FAECE7'},
  {id:'c5',name:'해산물',icon:'🐟',color:'#E1F5EE'},
  {id:'c6',name:'음료',icon:'🥤',color:'#EEEDFE'},
  {id:'c7',name:'냉동식품',icon:'🧊',color:'#E6F1FB'},
  {id:'c8',name:'기타',icon:'📦',color:'#F1EFE8'},
];
let buyItems=S.get('fk_buy')||[];
userName=S.get('fk_user')||'';

function save(){S.set('fk_foods',foods);S.set('fk_cats',cats);S.set('fk_buy',buyItems);S.set('fk_user',userName);S.set('fk_order',customOrder);if(familyCode)syncToCloud();}

// ===== 가족 공유 (Firebase) =====
let familyCode=S.get('fk_family')||'';
let familyMembers={};
// 기기 고유 ID (처음 한번 생성 후 유지)
let deviceId=S.get('fk_deviceid')||(()=>{const id='dev_'+Math.random().toString(36).slice(2,10);S.set('fk_deviceid',id);return id;})();
let isSyncing=false;
let unsubscribe=null;

async function syncToCloud(){
  if(!familyCode||isSyncing)return;
  if(!window._fbDb)return;
  isSyncing=true;
  try{
    const {doc,setDoc,getDoc}=window._fbFns;
    // members 객체에 현재 기기 등록
    let members=familyMembers||{};
    if(userName) members[deviceId]=userName;
    await setDoc(doc(window._fbDb,'families',familyCode),{
      foods,cats,buyItems,sharedMemo,members,updatedAt:Date.now()
    });
  }catch(e){console.log('sync error',e);}
  isSyncing=false;
}

async function loadFromCloud(){
  if(!familyCode||!window._fbDb)return false;
  try{
    const {doc,getDoc}=window._fbFns;
    const snap=await getDoc(doc(window._fbDb,'families',familyCode));
    if(snap.exists()){
      const d=snap.data();
      foods=d.foods||[];
      cats=d.cats||cats;
      buyItems=d.buyItems||[];
      sharedMemo=d.sharedMemo||'';
      familyMembers=d.members||{};
      S.set('fk_foods',foods);S.set('fk_cats',cats);S.set('fk_buy',buyItems);S.set('fk_memo',sharedMemo);
      return true;
    }
  }catch(e){console.log('load error',e);}
  return false;
}

function startRealtimeSync(){
  if(!familyCode||!window._fbDb)return;
  if(unsubscribe)unsubscribe();
  const {doc,onSnapshot}=window._fbFns;
  unsubscribe=onSnapshot(doc(window._fbDb,'families',familyCode),(snap)=>{
    if(snap.exists()&&!isSyncing){
      const d=snap.data();
      foods=d.foods||[];
      cats=d.cats||cats;
      buyItems=d.buyItems||[];
      sharedMemo=d.sharedMemo||'';
      familyMembers=d.members||{};
      S.set('fk_foods',foods);S.set('fk_cats',cats);S.set('fk_buy',buyItems);S.set('fk_memo',sharedMemo);
      // 현재 화면 새로고침
      const cur=screenStack[screenStack.length-1]||'home';
      if(cur==='home')renderHome();
      else if(cur==='list')renderList();
      else if(cur==='buy')renderBuy();
      // 메모 업데이트
      const memoEl=document.getElementById('shared-memo-input');
      if(memoEl&&document.activeElement!==memoEl)memoEl.value=sharedMemo;
    }
  });
}

async function joinFamily(code){
  if(!code)return;
  familyCode=code;
  S.set('fk_family',familyCode);
  const loaded=await loadFromCloud();
  // 본인 기기 이름 등록
  if(userName) familyMembers[deviceId]=userName;
  await syncToCloud();
  startRealtimeSync();
  renderHome();renderSettings();
  toast(loaded?`가족 공유 연결됐어요! (${code})`:`새 가족 공유 코드 '${code}' 생성됐어요!`);
}

async function leaveFamily(){
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  // members에서 본인 제거
  // 본인 기기 제거
  delete familyMembers[deviceId];
  await syncToCloud();
  familyCode='';familyMembers={};
  S.set('fk_family','');
  renderSettings();toast('가족 공유가 해제됐어요');
}

// 공유 메모
let sharedMemo=S.get('fk_memo')||'';
let memoTimer=null;
function saveMemo(val){
  sharedMemo=val;S.set('fk_memo',sharedMemo);
  clearTimeout(memoTimer);
  memoTimer=setTimeout(()=>{if(familyCode)syncToCloud();},1500);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function daysLeft(dateStr){const d=new Date(dateStr),t=today();return Math.ceil((d-t)/86400000);}
function dayLabel(n){if(n<0)return Math.abs(n)+'일 초과';if(n===0)return '오늘 만료';return n+'일 남음';}
function chipCls(n){if(n<0)return 'chip chip-exp';if(n<=3)return 'chip chip-warn';return 'chip chip-ok';}
function cardBorder(n){if(n<0)return 'danger';if(n<=3)return 'warn';return '';}
function catBy(id){return cats.find(c=>c.id===id)||{name:'기타',icon:'📦',color:'#F1EFE8'};}

let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}
function showConfirm(title,msg,okTxt='삭제'){return new Promise(res=>{dialogResolve=res;document.getElementById('dlg-title').textContent=title;document.getElementById('dlg-msg').textContent=msg;document.getElementById('dlg-ok').textContent=okTxt;document.getElementById('dialog').classList.add('open');});}
function closeDialog(ok){document.getElementById('dialog').classList.remove('open');if(dialogResolve){dialogResolve(ok);dialogResolve=null;}}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const t=document.getElementById('s-'+id);t.style.display='flex';t.classList.add('active');
}

// 뒤로가기 처리
const screenStack=[];
function go(s,push=true){
  if(push&&s!=='splash') screenStack.push(s);
  if(s==='home') renderHome();
  else if(s==='list'){if(document.getElementById('srch-inp'))document.getElementById('srch-inp').value='';renderSortBar();renderList();}
  else if(s==='buy') renderBuy();
  else if(s==='add') initAdd();
  else if(s==='settings') renderSettings();
  showScreen(s);
  // 히스토리 API로 뒤로가기 가로채기
  history.pushState({screen:s},'',location.pathname);
}
function goBack(){
  if(screenStack.length>1){screenStack.pop();const prev=screenStack[screenStack.length-1];go(prev,false);}
  else go('home',false);
}
window.addEventListener('popstate',()=>goBack());

function startApp(){
  const n=document.getElementById('ob-name').value.trim();
  if(!n){toast('이름을 입력해주세요!');return;}
  userName=n;save();
  screenStack.push('home');showScreen('home');renderHome();
  history.pushState({screen:'home'},'',location.pathname);
}

(function init(){
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  // 스플래시 동적 생성
  const splash = document.createElement('div');
  splash.style.cssText = 'position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;z-index:9999';
  splash.innerHTML = '<div style="width:96px;height:96px;border-radius:30px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:52px">❄️</div><div style="font-size:26px;font-weight:700;color:#fff">냉장고 지킴이</div><div style="font-size:14px;color:#9FE1CB">식품 유통기한 관리 앱</div>';
  document.body.appendChild(splash);

  setTimeout(async()=>{
    if(familyCode){
      try{
        // Firebase 완전히 준비될 때까지 대기
        if(!window._fbReady){
          await new Promise(r=>window.addEventListener('fbReady',r,{once:true}));
        }
        await loadFromCloud();
        // 본인 기기 이름 등록/업데이트
        if(userName){
          familyMembers[deviceId]=userName;
          await syncToCloud();
        }
        startRealtimeSync();
      }catch(e){console.log('init sync error',e);}
    }
    // 스플래시 제거
    splash.remove();
    // 다음 화면으로
    if(userName){
      screenStack.push('home');
      showScreen('home');
      renderHome();
      history.pushState({screen:'home'},'',location.pathname);
    } else {
      showScreen('ob');
    }
  }, 1500);
})();

function openFavDetail(){
  document.getElementById('catdetail-title').textContent='⭐ 즐겨찾기';
  const list=foods.filter(f=>f.fav).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let h='';
  if(!list.length){h=`<div class="empty"><div class="empty-icon">⭐</div><div class="empty-txt">즐겨찾기한 식품이 없어요</div></div>`;}
  else{list.forEach(f=>{const d=daysLeft(f.date),cat=catBy(f.catId);h+=`<div class="food-row ${cardBorder(d)}"><div class="cicon" style="width:48px;height:48px;background:${cat.color};font-size:26px">${f.icon}</div><div class="food-info"><div class="food-name">${f.name}</div><div class="food-meta"><span class="chip chip-cat">${cat.icon} ${cat.name}</span><span class="${chipCls(d)}">${f.date.slice(5).replace('-','.')} · ${dayLabel(d)}</span></div>${f.memo?`<div class="food-memo">${f.memo}</div>`:''}</div>${f.qty?`<span style="font-size:14px;font-weight:500;color:var(--txt2);flex-shrink:0">${f.qty}개</span>`:''}<button class="row-btn fav-on" onclick="toggleFav('${f.id}','fav')">⭐</button></div>`;});}
  document.getElementById('catdetail-body').innerHTML=h;
  go('catdetail');
}
function openCatDetail(catId){
  const cat=catBy(catId);
  document.getElementById('catdetail-title').textContent=cat.icon+' '+cat.name;
  const list=foods.filter(f=>f.catId===catId).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let h='';
  if(!list.length){h=`<div class="empty"><div class="empty-icon">${cat.icon}</div><div class="empty-txt">이 카테고리에 식품이 없어요</div></div>`;}
  else{list.forEach(f=>{const d=daysLeft(f.date);h+=`<div class="food-row ${cardBorder(d)}"><div class="cicon" style="width:48px;height:48px;background:${cat.color};font-size:26px">${f.icon}</div><div class="food-info"><div class="food-name">${f.name}</div><div class="food-meta"><span class="${chipCls(d)}">${f.date.slice(5).replace('-','.')} · ${dayLabel(d)}</span></div>${f.memo?`<div class="food-memo">${f.memo}</div>`:''}</div>${f.qty?`<span style="font-size:14px;font-weight:500;color:var(--txt2);flex-shrink:0">${f.qty}개</span>`:''}<button class="row-btn ${f.fav?'fav-on':''}" onclick="toggleFav('${f.id}','catdetail','${catId}')">⭐</button><button class="row-btn del" onclick="doDelFood('${f.id}','catdetail','${catId}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button></div>`;});}
  document.getElementById('catdetail-body').innerHTML=h;
  go('catdetail');
}

function renderSortBar(){
  document.getElementById('sort-bar').innerHTML=SORTS.map(s=>`<button class="sort-chip${s.k===curSort?' act':''}" onclick="setSort('${s.k}')">${s.lbl}</button>`).join('');
}
function setSort(k){curSort=k;renderSortBar();renderList();}

function renderList(){
  const q=(document.getElementById('srch-inp')||{value:''}).value.toLowerCase();
  let list=[...foods].filter(f=>!q||f.name.toLowerCase().includes(q));
  if(curSort==='expiry') list.sort((a,b)=>daysLeft(a.date)-daysLeft(b.date));
  else if(curSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if(curSort==='custom'){list.sort((a,b)=>{const oa=customOrder.indexOf(a.id),ob=customOrder.indexOf(b.id);if(oa===-1&&ob===-1)return 0;if(oa===-1)return 1;if(ob===-1)return -1;return oa-ob;});}
  else list.sort((a,b)=>a.id>b.id?1:-1);
  let h='';
  if(!list.length){h=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">${q?`'${q}' 검색 결과가 없어요`:'등록된 식품이 없어요'}</div></div>`;}
  else{list.forEach(f=>{const d=daysLeft(f.date),cat=catBy(f.catId);h+=`<div class="food-row ${cardBorder(d)}"><div class="cicon" style="width:48px;height:48px;background:${cat.color};font-size:26px">${f.icon}</div><div class="food-info"><div class="food-name">${f.name}</div><div class="food-meta"><span class="chip chip-cat">${cat.icon} ${cat.name}</span><span class="${chipCls(d)}">${f.date.slice(5).replace('-','.')} · ${dayLabel(d)}</span></div>${f.memo?`<div class="food-memo">${f.memo}</div>`:''}</div>${f.qty?`<span style="font-size:14px;font-weight:500;color:var(--txt2);flex-shrink:0">${f.qty}개</span>`:''}<button class="row-btn ${f.fav?'fav-on':''}" onclick="toggleFav('${f.id}','list')">⭐</button>${curSort==='custom'?`<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0"><button onclick="moveFood('${f.id}',-1)" style="width:30px;height:28px;border-radius:6px;border:1px solid var(--border);background:#f3f4f6;cursor:pointer;font-size:14px">↑</button><button onclick="moveFood('${f.id}',1)" style="width:30px;height:28px;border-radius:6px;border:1px solid var(--border);background:#f3f4f6;cursor:pointer;font-size:14px">↓</button></div>`:`<button class="row-btn del" onclick="doDelFood('${f.id}','list')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>`}</div>`;});}
  document.getElementById('list-body').innerHTML=h;
}

function toggleFav(id,from,catId){
  const f=foods.find(x=>x.id===id);if(!f)return;
  f.fav=!f.fav;save();
  if(from==='list') renderList();
  else if(from==='fav') openFavDetail();
  else if(from==='catdetail') openCatDetail(catId);
}
async function doDelFood(id,from,catId){
  const f=foods.find(x=>x.id===id);if(!f)return;
  const ok=await showConfirm('식품 삭제',`'${f.name}'을(를) 삭제할까요?`);
  if(ok){foods=foods.filter(x=>x.id!==id);save();toast('삭제됐어요');
    if(from==='list') renderList();
    else if(from==='catdetail') openCatDetail(catId);
  }
}

function renderBuy(){
  const done=buyItems.filter(b=>b.done).length;
  const btn=document.getElementById('clear-done-btn');
  if(btn) btn.style.display=done?'block':'none';
  const pct=buyItems.length?Math.round(done/buyItems.length*100):0;
  let h=`<div class="card" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div><div style="font-size:16px;font-weight:600;color:var(--txt1)">구매 목록</div><div style="font-size:13px;color:var(--txt2);margin-top:3px">${done}/${buyItems.length}개 완료</div></div>
    ${buyItems.length?`<div class="prog-ring"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="19" fill="none" stroke="#E5E7EB" stroke-width="4"/><circle cx="24" cy="24" r="19" fill="none" stroke="#1D9E75" stroke-width="4" stroke-dasharray="${2*Math.PI*19}" stroke-dashoffset="${2*Math.PI*19*(1-pct/100)}" stroke-linecap="round"/></svg><div class="prog-ring-lbl">${pct}%</div></div>`:''}
  </div>`;
  if(!buyItems.length){h+=`<div class="empty"><div class="empty-icon">🛒</div><div class="empty-txt">구매할 항목을 추가해보세요!</div></div>`;}
  else{buyItems.forEach(b=>{h+=`<div class="buy-row"><div class="buy-check ${b.done?'on':''}" onclick="toggleBuy('${b.id}')">${b.done?'✓':''}</div><span class="buy-name ${b.done?'done':''}">${b.name}</span><button class="row-btn del" onclick="delBuy('${b.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button></div>`;});}
  document.getElementById('buy-body').innerHTML=h;
}
function toggleBuy(id){const b=buyItems.find(x=>x.id===id);if(b){b.done=!b.done;save();renderBuy();}}
function delBuy(id){buyItems=buyItems.filter(x=>x.id!==id);save();renderBuy();}
function clearDone(){buyItems=buyItems.filter(b=>!b.done);save();renderBuy();}
function addBuy(){const inp=document.getElementById('buy-inp');const name=inp.value.trim();if(!name)return;buyItems.push({id:uid(),name,done:false});save();inp.value='';renderBuy();}

function initAdd(){
  selFoodE='🍎';isFavCheck=false;
  ['f-name','f-memo','f-qty'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-date').value='';
  document.getElementById('f-date-lbl').textContent='날짜를 선택하세요';
  document.getElementById('f-date-btn').className='date-btn empty';
  document.getElementById('fav-check-box').className='fav-check-box';
  document.getElementById('fav-check-box').textContent='';
  const sel=document.getElementById('f-cat');
  sel.innerHTML=cats.map(c=>`<option value="${c.id}">${c.icon}  ${c.name}</option>`).join('');
  document.getElementById('food-ep').innerHTML=FOOD_E.map(e=>`<button class="ep-btn${e===selFoodE?' sel':''}" onclick="pickFoodE('${e}')">${e}</button>`).join('');
}
function pickFoodE(e){selFoodE=e;document.querySelectorAll('#food-ep .ep-btn').forEach(b=>b.classList.toggle('sel',b.textContent===e));}
function toggleFavCheck(){isFavCheck=!isFavCheck;document.getElementById('fav-check-box').className='fav-check-box'+(isFavCheck?' on':'');document.getElementById('fav-check-box').textContent=isFavCheck?'✓':'';}
function openDatePicker(){document.getElementById('f-date').showPicker?document.getElementById('f-date').showPicker():document.getElementById('f-date').click();}
function onDateChange(){const v=document.getElementById('f-date').value;if(v){document.getElementById('f-date-lbl').textContent=v.replace(/-/g,'.');document.getElementById('f-date-btn').className='date-btn';}}
function saveFood(){
  const name=document.getElementById('f-name').value.trim();
  const catId=document.getElementById('f-cat').value;
  const date=document.getElementById('f-date').value;
  if(!name){toast('식품명을 입력해주세요');return;}
  if(!catId){toast('카테고리를 선택해주세요');return;}
  if(!date){toast('유통기한을 선택해주세요');return;}
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  const memo=document.getElementById('f-memo').value.trim();
  foods.push({id:uid(),name,icon:selFoodE,catId,date,qty,memo,fav:isFavCheck});
  save();toast('저장됐어요! 🎉');go('list');
}

      <div style="display:flex;gap:8px;padding:0 16px 14px">
        <input type="text" id="family-code-inp" placeholder="가족 코드 입력 (예: kim1234)" style="flex:1;padding:11px 12px;border-radius:10px;border:1px solid var(--border);font-size:14px;background:#fff;color:var(--txt1);font-family:inherit;outline:none">
        <button onclick="const v=document.getElementById('family-code-inp').value.trim();if(v)joinFamily(v);else toast('코드를 입력해주세요')" style="padding:0 16px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">연결</button>
      </div>`;
    }
  }
}
function moveFood(id,dir){
  // ensure all foods are in customOrder
  foods.forEach(f=>{if(!customOrder.includes(f.id))customOrder.push(f.id);});
  const idx=customOrder.indexOf(id);
  if(idx===-1)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=customOrder.length)return;
  customOrder.splice(idx,1);
  customOrder.splice(newIdx,0,id);
  save();renderList();
}

// ===== 카테고리 시트 =====
const CAT_E_LIST=['📦','🥛','🥬','🍎','🥩','🐟','🧃','🍪','🧂','🧊','🫙','🥚','🍗','🧀','🌶️','🥦','🍋','🍇','🍌','🥤'];
const CAT_COLORS_LIST=['#E6F1FB','#EAF3DE','#FAEEDA','#FAECE7','#E1F5EE','#EEEDFE','#FBEAF0','#F1EFE8'];
let editCatId=null;
let selCatE='📦';

function openCatSheet(id){
  editCatId=id;
  const c=id?cats.find(x=>x.id===id):null;
  selCatE=c?c.icon:'📦';
  document.getElementById('cat-sheet-title').textContent=c?'카테고리 수정':'카테고리 추가';
  document.getElementById('cs-save-btn').textContent=c?'저장':'추가';
  document.getElementById('cs-name').value=c?c.name:'';
  document.getElementById('cat-ep').innerHTML=CAT_E_LIST.map(e=>`<button class="ep-btn${e===selCatE?' sel':''}" onclick="pickCatE('${e}')">${e}</button>`).join('');
  document.getElementById('cat-sheet').classList.add('open');
}

function closeCatSheet(){
  document.getElementById('cat-sheet').classList.remove('open');
}

function pickCatE(e){
  selCatE=e;
  document.querySelectorAll('#cat-ep .ep-btn').forEach(b=>b.classList.toggle('sel',b.textContent===e));
}

function saveCat(){
  const name=document.getElementById('cs-name').value.trim();
  if(!name){toast('카테고리 이름을 입력해주세요');return;}
  if(editCatId){
    const c=cats.find(x=>x.id===editCatId);
    if(c){c.name=name;c.icon=selCatE;}
  } else {
    cats.push({id:uid(),name,icon:selCatE,color:CAT_COLORS_LIST[cats.length%CAT_COLORS_LIST.length]});
  }
  save();
  closeCatSheet();
  renderHome();
  toast(editCatId?'수정됐어요!':'카테고리가 추가됐어요!');
}

async function doDelCatHome(id){
  const c=cats.find(x=>x.id===id);if(!c)return;
  if(foods.some(f=>f.catId===id)){toast(`'${c.name}'에 식품이 있어서 삭제할 수 없어요`);return;}
  const ok=await showConfirm('카테고리 삭제',`'${c.name}' 카테고리를 삭제할까요?`);
  if(ok){cats=cats.filter(x=>x.id!==id);save();renderHome();toast('삭제됐어요');}
}

async function changeName(){
  const n=document.getElementById('set-name-inp').value.trim();
  if(!n){toast('이름을 입력해주세요');return;}
  const oldName=userName;
  userName=n;
  S.set('fk_user',userName);
  // members에서 본인 기기 이름 업데이트
  if(familyCode){
    familyMembers[deviceId]=n;
    await syncToCloud();
  }
  save();
  document.getElementById('set-name-v').textContent=userName;
  document.getElementById('set-name-inp').value='';
  renderSettings();
  toast(`이름이 '${userName}'으로 변경됐어요!`);
}
</script>
